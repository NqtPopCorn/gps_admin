<body class="font-body bg-background text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 z-0">

<main class="relative z-10 w-full max-w-md px-6 py-12">
<div class="glass-panel ambient-shadow rounded-xl p-8 md:p-12 flex flex-col items-center">
<div class="mb-10 text-center">
<div class="flex items-center justify-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">The Narrator</h1>
<p class="text-on-surface-variant font-medium tracking-wide text-sm">ADMIN CONSOLE</p>
</div>
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 transition-all" id="email" name="email" placeholder="admin@globalnarrator.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block font-label text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 transition-all" id="password" name="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<div class="flex items-center">
<label class="flex items-center group cursor-pointer">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container transition-all cursor-pointer" type="checkbox"/>
<span class="ml-3 text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Remember this session</span>
</label>
</div>
<button class="w-full primary-gradient text-on-primary font-headline font-bold py-4 rounded-lg flex items-center justify-center gap-2 hover:opacity-95 transition-all active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
<span>Sign In to Console</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-12 flex items-center gap-4 w-full">
<div class="h-px bg-outline-variant/30 flex-grow"></div>
<span class="text-xs font-bold text-outline uppercase tracking-[0.2em]">Secure Access</span>
<div class="h-px bg-outline-variant/30 flex-grow"></div>
</div>
<div class="mt-8 flex justify-center gap-6">
<div class="flex items-center gap-2 text-outline">
<span class="material-symbols-outlined text-sm" data-icon="language">language</span>
<span class="text-xs font-semibold">EN-US</span>
</div>
<div class="flex items-center gap-2 text-outline">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="text-xs font-semibold">SSL Encrypted</span>
</div>
</div>
</div>
<footer class="mt-8 text-center">
<p class="text-surface-container-highest/60 text-xs font-medium tracking-wide">

</div>
<div>
<p class="text-[10px] font-bold text-primary uppercase tracking-widest">Featured Curated Tour</p>
<p class="text-sm font-headline font-bold text-on-surface">The Roman Shadows</p>
</div>
</div>
</div>
